<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Setup — Emily's Snapshot Studio</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="client.css">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;900&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet">
<style type="text/css" nonce="">
.redacted {
  color: red !important;
}</style></head>
<body>
  <div class="aurora">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
    <div class="blob b4"></div>
  </div>
 
  <header class="topbar">
    <div class="brand">
      <a href="index.html" class="back-link">←</a>
      <h1 id="clientTitle">Loading…</h1>
      <button class="tpl-icon" id="tplIcon" title="View template" style="display:none;">
        <span>📄</span>
      </button>
    </div>
    <div class="topbar-actions">
      <button class="ghost-btn" onclick="location.href='index.html'">Dashboard</button>
      <button class="primary-btn" id="runWeekBtn">▶ Run This Week</button>
    </div>
  </header>
 
  <main class="client-page">
    <!-- Compact setup strip -->
    <section class="setup-strip">
      <div class="setup-card template-card">
        <div class="setup-title">Template</div>
        <div id="templateStatus" class="template-status">
          <div class="drop-zone-sm" id="templateDrop">
            <input type="file" id="templateInput" accept=".docx" hidden>
            <span>📄 Drop .docx</span>
          </div>
        </div>
      </div>
 
      <div class="setup-card reports-card">
        <div class="setup-title">Reports</div>
        <div class="reports-row" id="reportsList"></div>
        <button class="add-report-btn" id="addReportBtn">
          <input type="file" id="reportInput" accept=".xlsx,.xls,.csv" hidden>
          + Add report
        </button>
      </div>
    </section>
 
    <!-- Token grid -->
    <section class="tokens-section">
      <div class="tokens-header">
        <h2>Tokens</h2>
        <p class="hint">Click any token to edit its mapping. Emily can propose new ones — talk to her.</p>
      </div>
 
      <div class="tokens-grid" id="tokensGrid">
        <div class="tokens-empty" id="tokensEmpty">
          <div class="empty-icon">✨</div>
          <div class="empty-text">No tokens yet</div>
          <div class="empty-sub">Ask Emily to propose them → click her bubble bottom-right</div>
        </div>
      </div>
    </section>
  </main>
 
  <!-- Template preview modal (small icon opens this) -->
  <div class="modal-backdrop tpl-modal" id="tplModal" style="display:none;">
    <div class="tpl-modal-inner">
      <button class="modal-close" id="tplModalClose">×</button>
      <img id="templateModalImg" alt="Template">
    </div>
  </div>
 
  <!-- Token editor modal (click a token card opens this) -->
  <div class="modal-backdrop" id="tokenModal" style="display:none;">
    <div class="modal token-modal">
      <button class="modal-close" id="tokenModalClose">×</button>
      <h2 id="tokenModalTitle">Edit Token</h2>
      <p class="hint" id="tokenModalNote"></p>
 
      <label>
        Source Report
        <select id="tokenSource"></select>
      </label>
 
      <label>
        Operation
        <select id="tokenOperation">
          <option value="manual">Type manually each week</option>
          <option value="cell">Single cell</option>
          <option value="value_at_label">Value at label</option>
          <option value="sum">Column sum</option>
          <option value="section_sum">Sum under section</option>
          <option value="count">Row count</option>
        </select>
      </label>
 
      <div id="tokenConfig"></div>
 
      <div class="excel-preview" id="excelPreview" style="display:none;">
        <div class="excel-preview-title">Source data</div>
        <div id="excelPreviewTable"></div>
      </div>
 
      <div class="modal-actions">
        <button class="ghost-btn" id="tokenDeleteBtn">Delete</button>
        <button class="ghost-btn" id="tokenCancelBtn">Cancel</button>
        <button class="primary-btn" id="tokenSaveBtn">Save</button>
      </div>
    </div>
  </div>
 
  <!-- Emily floating chat -->
  <div class="emily-chat" id="emilyChat">
    <button class="emily-bubble" id="emilyBubble" title="Chat with Emily">
      <div class="emily-avatar">E</div>
      <div class="emily-pulse"></div>
    </button>
 
    <div class="emily-panel" id="emilyPanel">
      <header class="emily-header">
        <div class="emily-header-left">
          <div class="emily-avatar sm">E</div>
          <div>
            <div class="emily-name">Emily</div>
            <div class="emily-role" id="emilyClientName">Your assistant</div>
          </div>
        </div>
        <div class="emily-header-right">
          <button class="emily-expand" id="emilyReset" title="New chat">↻</button>
          <button class="emily-expand" id="emilyExpand" title="Expand">⛶</button>
          <button class="emily-close" id="emilyClose" title="Close">×</button>
        </div>
      </header>
      <div class="emily-messages" id="emilyMessages"></div>
      <div class="emily-input">
        <textarea id="emilyInput" placeholder="Type a message to Emily…" rows="1"></textarea>
        <button id="emilySend">➤</button>
      </div>
    </div>
  </div>
 
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="config.js"></script>
  <script src="client.js"></script>
</body>
</html>
